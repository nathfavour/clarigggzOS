name: Clarigggz CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.13.0

    - name: Run Unit Tests
      run: zig build test

    - name: Build x86_64 Simulator
      run: zig build simulator

    - name: Build RISC-V K1 Kernel
      run: zig build kernel
